[tox]
envlist = py312-django{42,52}, quality
requires = tox-uv>=1

[testenv]
runner = uv-venv-lock-runner
dependency_groups =
    django52: test
    django42: django42
commands =
    make test

[testenv:quality]
runner = uv-venv-lock-runner
dependency_groups = quality
commands =
    make quality

[pycodestyle]
# W504 line break after binary operator
# E722 do not use bare 'except' (pylint will tell us about that)
ignore = E501, W504, E722
max_line_length = 120
exclude = settings
